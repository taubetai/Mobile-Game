<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Snake Game</title>
  <style>
    body {
      margin: 0;
      background: #0b1f20;
      color: white;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      touch-action: manipulation;
    }

    .game-box {
      text-align: center;
      background: #102829;
      padding: 16px;
      border-radius: 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.35);
      width: min(95vw, 460px);
      box-sizing: border-box;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 28px;
    }

    p {
      margin: 0 0 12px 0;
      color: #d7f3f0;
      font-size: 14px;
      line-height: 1.4;
    }

    .topbar {
      display: flex;
      justify-content: center;
      gap: 10px;
      align-items: center;
      margin-bottom: 12px;
      flex-wrap: wrap;
      font-size: 16px;
    }

    button {
      background: #2bc46d;
      color: white;
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      font-size: 16px;
      cursor: pointer;
      font-weight: bold;
    }

    canvas {
      border: 2px solid #244d4f;
      border-radius: 12px;
      background: #183c3c;
      display: block;
      margin: 0 auto;
      width: min(88vw, 420px);
      height: min(88vw, 420px);
      max-width: 420px;
      max-height: 420px;
      touch-action: none;
    }

    .controls {
      margin-top: 14px;
      display: grid;
      grid-template-columns: repeat(3, 70px);
      grid-template-rows: repeat(2, 70px);
      justify-content: center;
      gap: 10px;
      user-select: none;
    }

    .ctrl-btn {
      background: #1e4f51;
      border: none;
      color: white;
      border-radius: 14px;
      font-size: 28px;
      font-weight: bold;
      width: 70px;
      height: 70px;
      touch-action: manipulation;
    }

    .ctrl-btn:active {
      transform: scale(0.96);
    }

    .up { grid-column: 2; grid-row: 1; }
    .left { grid-column: 1; grid-row: 2; }
    .down { grid-column: 2; grid-row: 2; }
    .right { grid-column: 3; grid-row: 2; }

    .small {
      margin-top: 10px;
      font-size: 13px;
      color: #b8dedd;
    }
  </style>
</head>
<body>
  <div class="game-box">
    <h1>Snake Game</h1>
    <p>Press Start. On phone, swipe or use the buttons. On computer, use arrow keys. After game over, tap Start or press Space.</p>

    <div class="topbar">
      <button onclick="startGame()">Start</button>
      <div id="score">Score: 0</div>
      <div id="highScore">High Score: 0</div>
    </div>

    <canvas id="game" width="420" height="420"></canvas>

    <div class="controls">
      <button class="ctrl-btn up" onclick="setDirection('up')">↑</button>
      <button class="ctrl-btn left" onclick="setDirection('left')">←</button>
      <button class="ctrl-btn down" onclick="setDirection('down')">↓</button>
      <button class="ctrl-btn right" onclick="setDirection('right')">→</button>
    </div>

    <div class="small">Phone-friendly version with swipe controls</div>
  </div>

  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");
    const highScoreEl = document.getElementById("highScore");

    const gridSize = 21;
    const tileSize = canvas.width / gridSize;

    let animationId = null;
    let highScore = Number(localStorage.getItem("snakeHighScore") || 0);

    const game = {
      snake: [],
      dx: 1,
      dy: 0,
      nextDx: 1,
      nextDy: 0,
      food: { x: 10, y: 10 },
      score: 0,
      speed: 140,
      lastTime: 0,
      gameOver: false,
      running: false
    };

    function updateScore() {
      scoreEl.textContent = "Score: " + game.score;
      highScoreEl.textContent = "High Score: " + highScore;
    }

    function saveHighScore() {
      localStorage.setItem("snakeHighScore", highScore);
    }

    function drawRoundedRect(x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
      ctx.fill();
    }

    function placeFood() {
      let valid = false;
      while (!valid) {
        game.food.x = Math.floor(Math.random() * gridSize);
        game.food.y = Math.floor(Math.random() * gridSize);
        valid = !game.snake.some(part => part.x === game.food.x && part.y === game.food.y);
      }
    }

    function drawBoard() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (let y = 0; y < gridSize; y++) {
        for (let x = 0; x < gridSize; x++) {
          ctx.fillStyle = (x + y) % 2 === 0 ? "#0f3d3e" : "#145a5c";
          ctx.fillRect(x * tileSize, y * tileSize, tileSize, tileSize);
        }
      }
    }

    function drawFood() {
      const px = game.food.x * tileSize + 3;
      const py = game.food.y * tileSize + 3;

      ctx.fillStyle = "#ff4d4d";
      drawRoundedRect(px, py, tileSize - 6, tileSize - 6, 6);

      ctx.fillStyle = "#7CFC00";
      ctx.beginPath();
      ctx.ellipse(
        game.food.x * tileSize + tileSize * 0.62,
        game.food.y * tileSize + tileSize * 0.24,
        4, 2.5, -0.5, 0, Math.PI * 2
      );
      ctx.fill();
    }

    function drawSnake() {
      game.snake.forEach((part, index) => {
        const px = part.x * tileSize + 2;
        const py = part.y * tileSize + 2;

        ctx.fillStyle = index === 0 ? "#5cff8d" : "#31c96b";
        drawRoundedRect(px, py, tileSize - 4, tileSize - 4, 6);

        if (index === 0) {
          ctx.fillStyle = "#111";

          let eye1x = px + tileSize * 0.22;
          let eye1y = py + tileSize * 0.22;
          let eye2x = px + tileSize * 0.52;
          let eye2y = py + tileSize * 0.22;

          if (game.dx === 1) {
            eye1x = px + tileSize * 0.58; eye1y = py + tileSize * 0.25;
            eye2x = px + tileSize * 0.58; eye2y = py + tileSize * 0.55;
          } else if (game.dx === -1) {
            eye1x = px + tileSize * 0.22; eye1y = py + tileSize * 0.25;
            eye2x = px + tileSize * 0.22; eye2y = py + tileSize * 0.55;
          } else if (game.dy === -1) {
            eye1x = px + tileSize * 0.25; eye1y = py + tileSize * 0.22;
            eye2x = px + tileSize * 0.55; eye2y = py + tileSize * 0.22;
          } else if (game.dy === 1) {
            eye1x = px + tileSize * 0.25; eye1y = py + tileSize * 0.58;
            eye2x = px + tileSize * 0.55; eye2y = py + tileSize * 0.58;
          }

          ctx.beginPath();
          ctx.arc(eye1x, eye1y, 2.3, 0, Math.PI * 2);
          ctx.arc(eye2x, eye2y, 2.3, 0, Math.PI * 2);
          ctx.fill();
        }
      });
    }

    function drawGameOver() {
      ctx.fillStyle = "rgba(0,0,0,0.55)";
      ctx.fillRect(0, 0, canvas.width, canvas.height);

      ctx.fillStyle = "white";
      ctx.textAlign = "center";
      ctx.font = "bold 34px Arial";
      ctx.fillText("Game Over", canvas.width / 2, canvas.height / 2 - 25);

      ctx.font = "20px Arial";
      ctx.fillText("Final Score: " + game.score, canvas.width / 2, canvas.height / 2 + 10);

      ctx.font = "18px Arial";
      ctx.fillText("High Score: " + highScore, canvas.width / 2, canvas.height / 2 + 38);

      ctx.font = "16px Arial";
      ctx.fillText("Tap Start to play again", canvas.width / 2, canvas.height / 2 + 68);
    }

    function endGame() {
      game.gameOver = true;
      if (game.score > highScore) {
        highScore = game.score;
        saveHighScore();
      }
      updateScore();
    }

    function moveSnake() {
      game.dx = game.nextDx;
      game.dy = game.nextDy;

      const head = {
        x: game.snake[0].x + game.dx,
        y: game.snake[0].y + game.dy
      };

      if (head.x < 0 || head.x >= gridSize || head.y < 0 || head.y >= gridSize) {
        endGame();
        return;
      }

      if (game.snake.some(part => part.x === head.x && part.y === head.y)) {
        endGame();
        return;
      }

      game.snake.unshift(head);

      if (head.x === game.food.x && head.y === game.food.y) {
        game.score++;
        if (game.score > highScore) {
          highScore = game.score;
          saveHighScore();
        }
        game.speed = Math.max(60, game.speed - 6);
        updateScore();
        placeFood();
      } else {
        game.snake.pop();
      }
    }

    function drawAll() {
      drawBoard();
      drawFood();
      drawSnake();
      if (game.gameOver) drawGameOver();
    }

    function loop(timestamp) {
      if (!game.running) return;

      if (!game.lastTime) game.lastTime = timestamp;
      const elapsed = timestamp - game.lastTime;

      if (!game.gameOver && elapsed >= game.speed) {
        game.lastTime = timestamp;
        moveSnake();
      }

      drawAll();
      animationId = requestAnimationFrame(loop);
    }

    function startGame() {
      if (animationId) cancelAnimationFrame(animationId);

      game.snake = [
        { x: 5, y: 10 },
        { x: 4, y: 10 },
        { x: 3, y: 10 }
      ];
      game.dx = 1;
      game.dy = 0;
      game.nextDx = 1;
      game.nextDy = 0;
      game.food = { x: 10, y: 10 };
      game.score = 0;
      game.speed = 140;
      game.lastTime = 0;
      game.gameOver = false;
      game.running = true;

      placeFood();
      updateScore();
      drawAll();
      animationId = requestAnimationFrame(loop);
    }

    function setDirection(dir) {
      if (game.gameOver) return;

      if (dir === "up" && game.dy !== 1) {
        game.nextDx = 0;
        game.nextDy = -1;
      } else if (dir === "down" && game.dy !== -1) {
        game.nextDx = 0;
        game.nextDy = 1;
      } else if (dir === "left" && game.dx !== 1) {
        game.nextDx = -1;
        game.nextDy = 0;
      } else if (dir === "right" && game.dx !== -1) {
        game.nextDx = 1;
        game.nextDy = 0;
      }
    }

    document.addEventListener("keydown", function(e) {
      const key = e.key;

      if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", " "].includes(key)) {
        e.preventDefault();
      }

      if (key === " " || key === "Spacebar") {
        if (game.gameOver) startGame();
        return;
      }

      if (key === "ArrowUp") setDirection("up");
      else if (key === "ArrowDown") setDirection("down");
      else if (key === "ArrowLeft") setDirection("left");
      else if (key === "ArrowRight") setDirection("right");
    });

    let touchStartX = 0;
    let touchStartY = 0;

    canvas.addEventListener("touchstart", function(e) {
      const touch = e.changedTouches[0];
      touchStartX = touch.clientX;
      touchStartY = touch.clientY;
      e.preventDefault();
    }, { passive: false });

    canvas.addEventListener("touchend", function(e) {
      const touch = e.changedTouches[0];
      const dx = touch.clientX - touchStartX;
      const dy = touch.clientY - touchStartY;

      if (Math.abs(dx) < 20 && Math.abs(dy) < 20) return;

      if (Math.abs(dx) > Math.abs(dy)) {
        if (dx > 0) setDirection("right");
        else setDirection("left");
      } else {
        if (dy > 0) setDirection("down");
        else setDirection("up");
      }

      e.preventDefault();
    }, { passive: false });

    updateScore();
    drawAll();
  </script>
</body>
</html>
